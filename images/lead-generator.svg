  <text x="122" y="58" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#a9a89b">lead-pipeline — zsh</text>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">
    <text x="72" y="108" fill="#8fd07c">$ <tspan fill="#e8e4d9">importinfo pull --batch weekly</tspan></text>
    <text x="94" y="136" fill="#a9a89b">↳ 1,284 leads fetched · 0 errors</text>
    <text x="72" y="176" fill="#8fd07c">$ <tspan fill="#e8e4d9">map --target seamless-ai --validate</tspan></text>
